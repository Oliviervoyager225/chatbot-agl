<aside class="sidebar">
  <!-- Header -->
  <div class="sb-header">
    <div class="sb-brand">
      <div class="sb-logo">
        <img src="logo-agl.png" alt="AGL" class="sb-logo-img" />
      </div>
      <span class="sb-name">AGL Bot</span>
    </div>
    <button class="sb-collapse" title="Collapse sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
  </div>

  <!-- New Chat -->
  <button class="new-chat-btn" (click)="onNewChat()">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    {{ t.newChat }}
  </button>

  <!-- Search -->
  <div class="sb-search">
    <svg class="sb-search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" [placeholder]="t.search" />
    <span class="sb-shortcut">⌘</span>
  </div>

  <!-- Nav -->
  <nav class="sb-nav">
    <a class="sb-nav-item" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      {{ t.explore }}
    </a>
    <a class="sb-nav-item" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      {{ t.library }}
    </a>
    <a class="sb-nav-item active" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        <polyline points="12 7 12 12 15 14"/>
      </svg>
      {{ t.history }}
    </a>
  </nav>

  <!-- History list -->
  <div class="sb-history">
    <div class="sb-section-label">{{ t.today }}</div>
    @for (item of todayItems(); track item.id) {
      <div
        class="sb-history-item"
        [class.active]="item.active"
        (click)="onHistoryClick(item.id)"
      >{{ item.title }}</div>
    }
  </div>

  <!-- User -->
  <div class="sb-user">
    <div class="sb-user-avatar">JC</div>
    <div class="sb-user-info">
      <div class="sb-user-name">Jackson Carter</div>
      <div class="sb-user-email">jackson&#64;farmbridge.ai</div>
    </div>
    <button class="sb-user-logout" title="Logout">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</aside>
