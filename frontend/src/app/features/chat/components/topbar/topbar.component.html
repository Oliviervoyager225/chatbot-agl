<div class="main-topbar">
  <button class="model-pill">
    <span class="model-pill-dot" [class.offline]="apiOnline === false" [title]="apiOnline === false ? 'API hors ligne' : apiOnline === true ? 'API en ligne' : 'Connexion...'"></span>
    AGL Bot
    <svg class="model-pill-caret" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  <div class="topbar-right">
    <button class="topbar-icon-btn" title="More">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="1.2" fill="currentColor"/>
        <circle cx="19" cy="12" r="1.2" fill="currentColor"/>
        <circle cx="5" cy="12" r="1.2" fill="currentColor"/>
      </svg>
    </button>
    <button class="topbar-icon-btn" title="Share">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>
    <button class="topbar-btn-outline">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      {{ t.exportChat }}
    </button>
  </div>
</div>
