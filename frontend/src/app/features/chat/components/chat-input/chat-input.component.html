<div class="input-card" [class.loading]="isLoading">
  <textarea
    #textarea
    class="input-textarea"
    [placeholder]="t.inputPlaceholder"
    rows="1"
    [(ngModel)]="message"
    (keydown)="onKeydown($event)"
    (input)="autosize()"
    [disabled]="isLoading"
  ></textarea>

  <div class="input-toolbar">
    <div class="input-toolbar-left">
      <button class="pill-research" (click)="send()" [disabled]="isLoading || !message.trim()">
        <span class="pill-research-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        {{ t.deeperResearch }}
      </button>
      <button class="icon-btn-sm" title="Attach image">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
        </svg>
      </button>
      <button class="icon-btn-sm" title="Ideas">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M9 18h6"/><path d="M10 22h4"/>
          <path d="M12 2a7 7 0 0 0-4 12.7c.5.4.9 1 1 1.6V18h6v-1.7c0-.6.4-1.2 1-1.6A7 7 0 0 0 12 2z"/>
        </svg>
      </button>
    </div>

    <div class="input-toolbar-right">
      <button class="icon-btn-sm" title="Web search">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </button>
      <button
        class="mic-btn"
        [class.loading]="isLoading"
        [class.recording]="isRecording()"
        [title]="isRecording() ? 'Arrêter l\'écoute' : 'Question vocale'"
        (click)="onMicClick()"
        [disabled]="isLoading"
      >
        @if (isLoading) {
          <span class="spinner"></span>
        } @else if (isRecording()) {
          <!-- Stop / waveform icon -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        } @else {
          <!-- Microphone icon -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        }
      </button>
    </div>
  </div>
</div>

<!-- Saved prompts row -->
<div class="saved-row">
  <div class="saved-left">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    {{ t.savedPrompts }}
  </div>
  <button class="attach-btn">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
    </svg>
    {{ t.attachFile }}
  </button>
</div>
